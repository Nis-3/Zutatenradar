# Anwendungsname
spring.application.name=Zutatenradar

# Server-Port
server.port=8080

# ========== PostgreSQL Datenbank ==========
spring.datasource.url=jdbc:postgresql://localhost:5432/zutatenradar
spring.datasource.username=zutatenradar
spring.datasource.password=geheim

# JPA: Tabellen automatisch aus Entities erstellen/aktualisieren
spring.jpa.hibernate.ddl-auto=update

# SQL-Befehle in der Konsole anzeigen (hilfreich zum Lernen, spaeter ausschalten)
spring.jpa.show-sql=true

# JSON huebsch formatiert ausgeben (nur fuer Entwicklung)
spring.jackson.serialization.indent-output=true

# ========== OpenFoodFacts API ==========
openfoodfacts.api.base-url=https://world.openfoodfacts.org
openfoodfacts.api.connect-timeout-ms=2000
openfoodfacts.api.read-timeout-ms=5000
